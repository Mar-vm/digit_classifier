<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reconocimiento de Dígitos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #09090d;
        --bg-grid: #120c17;
        --card: #120a16;
        --card-border: #2a1230;
        --fuchsia: #ff2ec4;
        --fuchsia-dim: #7a1a5e;
        --violet: #8b1fd4;
        --ink: #f6eef8;
        --muted: #a98fb0;
        --muted-dim: #5e4a66;
        --ok: #39ffb0;
    }

    * {
        box-sizing: border-box;
    }

    html, body {
        height: 100%;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
            radial-gradient(circle at 15% 10%, rgba(255, 46, 196, 0.10), transparent 40%),
            radial-gradient(circle at 85% 90%, rgba(139, 31, 212, 0.12), transparent 45%),
            var(--bg);
        background-image:
            linear-gradient(rgba(255, 46, 196, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 46, 196, 0.05) 1px, transparent 1px),
            radial-gradient(circle at 15% 10%, rgba(255, 46, 196, 0.10), transparent 40%),
            radial-gradient(circle at 85% 90%, rgba(139, 31, 212, 0.12), transparent 45%),
            var(--bg);
        background-size: 28px 28px, 28px 28px, auto, auto, auto;
        font-family: 'Space Grotesk', sans-serif;
        color: var(--ink);
        padding: 24px;
    }

    .card {
        position: relative;
        background: linear-gradient(180deg, var(--card), #0d0710);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        padding: 30px 30px 26px;
        width: 100%;
        max-width: 400px;
        text-align: center;
        box-shadow:
            0 0 0 1px rgba(255, 46, 196, 0.06),
            0 20px 60px rgba(0, 0, 0, 0.6),
            0 0 80px rgba(139, 31, 212, 0.08);
    }

    .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.68rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--fuchsia);
        margin-bottom: 10px;
    }

    .eyebrow .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--fuchsia);
        box-shadow: 0 0 8px 1px var(--fuchsia);
        animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
    }

    h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 4px 0;
        letter-spacing: -0.01em;
    }

    p.subtitle {
        margin: 0 0 22px 0;
        color: var(--muted);
        font-size: 0.85rem;
    }

    /* ---------- Visor de escaneo ---------- */

    .scanner {
        position: relative;
        width: 100%;
        max-width: 300px;
        aspect-ratio: 1 / 1;
        margin: 0 auto;
        padding: 14px;
    }

    .scanner::before,
    .scanner::after,
    .corner-br,
    .corner-bl {
        content: "";
        position: absolute;
        width: 26px;
        height: 26px;
        border: 2px solid var(--fuchsia);
        filter: drop-shadow(0 0 4px rgba(255, 46, 196, 0.7));
    }

    .scanner::before {
        top: 0; left: 0;
        border-right: none;
        border-bottom: none;
        border-radius: 6px 0 0 0;
    }

    .scanner::after {
        top: 0; right: 0;
        border-left: none;
        border-bottom: none;
        border-radius: 0 6px 0 0;
    }

    .corner-bl {
        bottom: 0; left: 0;
        border-right: none;
        border-top: none;
        border-radius: 0 0 0 6px;
    }

    .corner-br {
        bottom: 0; right: 0;
        border-left: none;
        border-top: none;
        border-radius: 0 0 6px 0;
    }

    #drawCanvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #000;
        border-radius: 4px;
        border: 1px solid rgba(255, 46, 196, 0.25);
        touch-action: none;
        cursor: crosshair;
    }

    .scan-line {
        position: absolute;
        left: 14px;
        right: 14px;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--fuchsia), transparent);
        box-shadow: 0 0 12px 2px var(--fuchsia);
        top: 14px;
        opacity: 0;
        pointer-events: none;
    }

    .scan-line.active {
        animation: scan 1.1s linear infinite;
        opacity: 1;
    }

    @keyframes scan {
        0%   { top: 14px; }
        100% { top: calc(100% - 16px); }
    }

    /* ---------- Controles ---------- */

    .buttons {
        display: flex;
        gap: 10px;
        margin-top: 20px;
    }

    button {
        flex: 1;
        padding: 12px 0;
        border-radius: 10px;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 0.92rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.12s ease, filter 0.15s ease;
        border: 1px solid transparent;
    }

    button:active {
        transform: scale(0.96);
    }

    #predictBtn {
        background: linear-gradient(135deg, var(--fuchsia), var(--violet));
        color: #140018;
        box-shadow: 0 4px 20px rgba(255, 46, 196, 0.35);
    }

    #predictBtn:hover {
        filter: brightness(1.08);
    }

    #clearBtn {
        background: transparent;
        color: var(--muted);
        border-color: var(--card-border);
    }

    #clearBtn:hover {
        color: var(--ink);
        border-color: var(--fuchsia-dim);
    }

    .toggle {
        margin-top: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.72rem;
        color: var(--muted);
    }

    .toggle input {
        accent-color: var(--fuchsia);
    }

    /* ---------- Resultado ---------- */

    .result {
        margin-top: 22px;
        min-height: 96px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .result .status-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.78rem;
        color: var(--muted);
        letter-spacing: 0.02em;
    }

    .result .status-text .cursor {
        display: inline-block;
        width: 6px;
        height: 12px;
        background: var(--fuchsia);
        margin-left: 4px;
        animation: blink 1s step-start infinite;
        vertical-align: middle;
    }

    @keyframes blink {
        50% { opacity: 0; }
    }

    .result .digit {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 3.6rem;
        font-weight: 700;
        line-height: 1;
        color: var(--fuchsia);
        text-shadow: 0 0 22px rgba(255, 46, 196, 0.55), 0 0 60px rgba(139, 31, 212, 0.35);
        animation: reveal 0.35s ease;
    }

    @keyframes reveal {
        from { opacity: 0; transform: scale(0.85); }
        to { opacity: 1; transform: scale(1); }
    }

    .result .label {
        color: var(--muted);
        font-size: 0.88rem;
        margin-top: 4px;
    }

    .result .confidence {
        margin-top: 6px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.76rem;
        color: var(--ok);
    }

    .status {
        margin-top: 16px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.68rem;
        letter-spacing: 0.04em;
        color: var(--muted-dim);
    }

    .status.ready {
        color: var(--ok);
    }
</style>
</head>
<body>

<div class="card">
    <div class="eyebrow"><span class="dot"></span>Modelo neuronal · 16&times;16</div>
    <h1>Reconocimiento de Dígitos</h1>
    <p class="subtitle">Dibuja un número del 0 al 9 en el visor</p>

    <div class="scanner">
        <div class="scan-line" id="scanLine"></div>
        <canvas id="drawCanvas" width="280" height="280"></canvas>
    </div>

    <div class="buttons">
        <button id="predictBtn">Predecir</button>
        <button id="clearBtn">Borrar</button>
    </div>

    <label class="toggle">
        <input type="checkbox" id="autoPredict" checked>
        Auto-predecir al soltar el lápiz
    </label>

    <div class="result" id="result">
        <div class="status-text">Esperando un dígito<span class="cursor"></span></div>
    </div>

    <div class="status" id="apiStatus">CONECTANDO CON EL SERVIDOR...</div>
</div>

<script>
const API_URL = "https://digit-classifier2.onrender.com";

const canvas = document.getElementById("drawCanvas");
const ctx = canvas.getContext("2d");
const resultDiv = document.getElementById("result");
const autoPredictCheckbox = document.getElementById("autoPredict");
const apiStatusDiv = document.getElementById("apiStatus");
const scanLine = document.getElementById("scanLine");

const IMG_SIZE = 16;
let drawing = false;
let hasDrawn = false;

function resetCanvas() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 18;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    hasDrawn = false;
}
resetCanvas();

async function warmUpBackend() {
    try {
        const res = await fetch(`${API_URL}/`);
        if (res.ok) {
            apiStatusDiv.textContent = "SERVIDOR LISTO ✓";
            apiStatusDiv.classList.add("ready");
        } else {
            apiStatusDiv.textContent = "DESPERTANDO SERVIDOR...";
        }
    } catch (err) {
        apiStatusDiv.textContent = "DESPERTANDO SERVIDOR...";
    }
}
warmUpBackend();

function getPos(evt) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;

    if (evt.touches && evt.touches.length > 0) {
        return {
            x: (evt.touches[0].clientX - rect.left) * scaleX,
            y: (evt.touches[0].clientY - rect.top) * scaleY
        };
    }
    return {
        x: (evt.clientX - rect.left) * scaleX,
        y: (evt.clientY - rect.top) * scaleY
    };
}

function startDraw(evt) {
    evt.preventDefault();
    drawing = true;
    hasDrawn = true;
    const pos = getPos(evt);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
}

function draw(evt) {
    if (!drawing) return;
    evt.preventDefault();
    const pos = getPos(evt);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
}

function endDraw(evt) {
    if (!drawing) return;
    drawing = false;
    if (autoPredictCheckbox.checked && hasDrawn) {
        predict();
    }
}

canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", endDraw);
canvas.addEventListener("mouseleave", endDraw);

canvas.addEventListener("touchstart", startDraw);
canvas.addEventListener("touchmove", draw);
canvas.addEventListener("touchend", endDraw);

document.getElementById("clearBtn").addEventListener("click", () => {
    resetCanvas();
    resultDiv.innerHTML = '<div class="status-text">Esperando un dígito<span class="cursor"></span></div>';
});

document.getElementById("predictBtn").addEventListener("click", () => {
    if (!hasDrawn) return;
    predict();
});

function getPixelsFromCanvas() {
    const smallCanvas = document.createElement("canvas");
    smallCanvas.width = IMG_SIZE;
    smallCanvas.height = IMG_SIZE;
    const smallCtx = smallCanvas.getContext("2d");
    smallCtx.imageSmoothingEnabled = true;
    smallCtx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, IMG_SIZE, IMG_SIZE);

    const imageData = smallCtx.getImageData(0, 0, IMG_SIZE, IMG_SIZE).data;
    const pixels = [];

    for (let i = 0; i < imageData.length; i += 4) {
        pixels.push(imageData[i]);
    }

    return pixels;
}

async function predict() {
    resultDiv.innerHTML = '<div class="status-text">Analizando trazo<span class="cursor"></span></div>';
    scanLine.classList.add("active");

    const pixels = getPixelsFromCanvas();

    try {
        const response = await fetch(`${API_URL}/predict`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ pixels })
        });

        if (!response.ok) {
            throw new Error("Error en la predicción");
        }

        const data = await response.json();
        const confidencePct = (data.confidence * 100).toFixed(1);

        apiStatusDiv.textContent = "SERVIDOR LISTO ✓";
        apiStatusDiv.classList.add("ready");

        resultDiv.innerHTML = `
            <div class="digit">${data.digit}</div>
            <div class="label">Escribiste el número "${data.digit}"</div>
            <div class="confidence">CONFIANZA ${confidencePct}%</div>
        `;
    } catch (err) {
        resultDiv.innerHTML = '<div class="status-text" style="color:#ff5c7a">Error al predecir, intenta de nuevo</div>';
        console.error(err);
    } finally {
        scanLine.classList.remove("active");
    }
}
</script>

</body>
</html>
