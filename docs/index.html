<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reconocimiento de Dígitos</title>
<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #101418;
        font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        color: #eef1f5;
        padding: 20px;
    }

    .card {
        background: #181d24;
        border-radius: 18px;
        padding: 28px 32px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        width: 100%;
        max-width: 420px;
        text-align: center;
    }

    h1 {
        font-size: 1.3rem;
        margin: 0 0 4px 0;
        letter-spacing: 0.3px;
    }

    p.subtitle {
        margin: 0 0 20px 0;
        color: #8a94a3;
        font-size: 0.9rem;
    }

    #drawCanvas {
        background: #000;
        border-radius: 12px;
        border: 2px solid #2a3038;
        touch-action: none;
        cursor: crosshair;
        width: 100%;
        max-width: 320px;
        aspect-ratio: 1 / 1;
    }

    .buttons {
        display: flex;
        gap: 10px;
        margin-top: 18px;
    }

    button {
        flex: 1;
        padding: 12px 0;
        border: none;
        border-radius: 10px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.1s ease, opacity 0.2s ease;
    }

    button:active {
        transform: scale(0.97);
    }

    #predictBtn {
        background: #4f8cff;
        color: white;
    }

    #clearBtn {
        background: #2a3038;
        color: #eef1f5;
    }

    .result {
        margin-top: 22px;
        min-height: 90px;
    }

    .result .digit {
        font-size: 3.2rem;
        font-weight: 700;
        line-height: 1;
        color: #4f8cff;
    }

    .result .label {
        color: #8a94a3;
        font-size: 0.9rem;
        margin-top: 6px;
    }

    .result .confidence {
        margin-top: 4px;
        font-size: 0.85rem;
        color: #6ee7a1;
    }

    .toggle {
        margin-top: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 0.85rem;
        color: #8a94a3;
    }

    .status {
        margin-top: 14px;
        font-size: 0.78rem;
        color: #565f6c;
    }

    .status.ready {
        color: #6ee7a1;
    }
</style>
</head>
<body>

<div class="card">
    <h1>Reconocimiento de Dígitos</h1>
    <p class="subtitle">Dibuja un número del 0 al 9 en el recuadro</p>

    <canvas id="drawCanvas" width="280" height="280"></canvas>

    <div class="buttons">
        <button id="predictBtn">Predecir</button>
        <button id="clearBtn">Borrar</button>
    </div>

    <label class="toggle">
        <input type="checkbox" id="autoPredict" checked>
        Predecir automáticamente al soltar el lápiz
    </label>

    <div class="result" id="result">
        <div class="label">Esperando un dígito...</div>
    </div>

    <div class="status" id="apiStatus">Conectando con el servidor...</div>
</div>

<script>
// -----------------------------------------------------------------------
// IMPORTANTE: reemplaza esta URL por la de tu backend en Render.
// Debe apuntar al backend (Flask + modelo), no a este archivo.
// -----------------------------------------------------------------------
const API_URL = "https://digit-classifier2.onrender.com";

const canvas = document.getElementById("drawCanvas");
const ctx = canvas.getContext("2d");
const resultDiv = document.getElementById("result");
const autoPredictCheckbox = document.getElementById("autoPredict");
const apiStatusDiv = document.getElementById("apiStatus");

const IMG_SIZE = 16;
let drawing = false;
let hasDrawn = false;

function resetCanvas() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 18;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    hasDrawn = false;
}
resetCanvas();

// "Calienta" el backend apenas se abre la página, así para cuando la persona
// termine de dibujar el servidor ya está despierto y responde rápido.
async function warmUpBackend() {
    try {
        const res = await fetch(`${API_URL}/`);
        if (res.ok) {
            apiStatusDiv.textContent = "Servidor listo ✓";
            apiStatusDiv.classList.add("ready");
        } else {
            apiStatusDiv.textContent = "El servidor está despertando, puede tardar unos segundos...";
        }
    } catch (err) {
        apiStatusDiv.textContent = "El servidor está despertando, puede tardar unos segundos...";
    }
}
warmUpBackend();

function getPos(evt) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;

    if (evt.touches && evt.touches.length > 0) {
        return {
            x: (evt.touches[0].clientX - rect.left) * scaleX,
            y: (evt.touches[0].clientY - rect.top) * scaleY
        };
    }
    return {
        x: (evt.clientX - rect.left) * scaleX,
        y: (evt.clientY - rect.top) * scaleY
    };
}

function startDraw(evt) {
    evt.preventDefault();
    drawing = true;
    hasDrawn = true;
    const pos = getPos(evt);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
}

function draw(evt) {
    if (!drawing) return;
    evt.preventDefault();
    const pos = getPos(evt);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
}

function endDraw(evt) {
    if (!drawing) return;
    drawing = false;
    if (autoPredictCheckbox.checked && hasDrawn) {
        predict();
    }
}

canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", endDraw);
canvas.addEventListener("mouseleave", endDraw);

canvas.addEventListener("touchstart", startDraw);
canvas.addEventListener("touchmove", draw);
canvas.addEventListener("touchend", endDraw);

document.getElementById("clearBtn").addEventListener("click", () => {
    resetCanvas();
    resultDiv.innerHTML = '<div class="label">Esperando un dígito...</div>';
});

document.getElementById("predictBtn").addEventListener("click", () => {
    if (!hasDrawn) return;
    predict();
});

function getPixelsFromCanvas() {
    const smallCanvas = document.createElement("canvas");
    smallCanvas.width = IMG_SIZE;
    smallCanvas.height = IMG_SIZE;
    const smallCtx = smallCanvas.getContext("2d");
    smallCtx.imageSmoothingEnabled = true;
    smallCtx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, IMG_SIZE, IMG_SIZE);

    const imageData = smallCtx.getImageData(0, 0, IMG_SIZE, IMG_SIZE).data;
    const pixels = [];

    for (let i = 0; i < imageData.length; i += 4) {
        pixels.push(imageData[i]);
    }

    return pixels;
}

async function predict() {
    resultDiv.innerHTML = '<div class="label">Analizando... (si el servidor estaba dormido, puede tardar hasta 1 min)</div>';

    const pixels = getPixelsFromCanvas();

    try {
        const response = await fetch(`${API_URL}/predict`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ pixels })
        });

        if (!response.ok) {
            throw new Error("Error en la predicción");
        }

        const data = await response.json();
        const confidencePct = (data.confidence * 100).toFixed(1);

        apiStatusDiv.textContent = "Servidor listo ✓";
        apiStatusDiv.classList.add("ready");

        resultDiv.innerHTML = `
            <div class="digit">${data.digit}</div>
            <div class="label">Escribiste el número "${data.digit}"</div>
            <div class="confidence">Confianza: ${confidencePct}%</div>
        `;
    } catch (err) {
        resultDiv.innerHTML = '<div class="label">Ocurrió un error al predecir. Intenta de nuevo en unos segundos.</div>';
        console.error(err);
    }
}
</script>

</body>
</html>
